<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOUDA GAZE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{{ 'privacy-active' if privacy else '' }}">
    <div id="app-container">
        <div id="top-bar">
            <h1>Gouda Gaze</h1>
        </div>
        <nav class="page-nav">
            <a href="/" class="nav-link nav-link-active">&#9654; Live</a>
            <a href="/gallery" class="nav-link">&#9783; Gallery</a>
            {% if current_user.is_admin %}
            <a href="/admin/users" class="nav-link">
                &#9881; Users
                {% if pending_count > 0 %}
                <span class="nav-badge">{{ pending_count }}</span>
                {% endif %}
            </a>
            {% endif %}
            <span class="nav-user">{{ current_user.name }}</span>
            <a href="/logout" class="nav-link nav-link-logout">&#8594; Logout</a>
        </nav>
        <div id="main-layout">

            <!-- Left: video + zoom -->
            <div id="video-col">
                <div id="video-viewport">
                    {% if privacy %}
                        <img id="cam-feed" src="/privacy-image" alt="Privacy Mode">
                    {% else %}
                        <video
                            id="cam-feed"
                            autoplay
                            playsinline
                            muted>
                        </video>
                    {% endif %}

                    <!-- Snapshot thumbnail preview — shown briefly after a successful capture -->
                    <div id="snapshot-preview" class="snapshot-preview" hidden>
                        <img id="snapshot-preview-img" src="" alt="Snapshot preview">
                    </div>
                </div>

                <div class="zoom-bar {{ 'disabled' if privacy else '' }}">
                    <span class="zoom-label">1x</span>
                    <input
                        type="range"
                        id="zoom-slider"
                        min="100" max="400" step="10" value="100"
                        aria-label="Zoom"
                        {{ 'disabled' if privacy else '' }}>
                    <span class="zoom-label" id="zoom-value">1.0x</span>
                </div>
            </div>

            <!-- Right: d-pad + action buttons -->
            <div class="control-panel">
                <div class="controls-col">
                    <div class="d-pad-grid">
                        <button class="control-btn" style="grid-area: up"    data-dir="up"    {{ 'disabled' if privacy else '' }}>&#9650;</button>
                        <button class="control-btn" style="grid-area: left"  data-dir="left"  {{ 'disabled' if privacy else '' }}>&#9664;</button>
                        <button class="control-btn home-btn" style="grid-area: center" id="home-btn" {{ 'disabled' if privacy else '' }}>&#8962;</button>
                        <button class="control-btn" style="grid-area: right" data-dir="right" {{ 'disabled' if privacy else '' }}>&#9654;</button>
                        <button class="control-btn" style="grid-area: down"  data-dir="down"  {{ 'disabled' if privacy else '' }}>&#9660;</button>
                    </div>

                    <!-- Snapshot button -->
                    <button class="action-btn snapshot-btn" id="snapshot-btn" {{ 'disabled' if privacy else '' }}>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <!-- Camera body -->
                            <rect x="1" y="4" width="14" height="10" rx="1.5"/>
                            <!-- Lens -->
                            <circle cx="8" cy="9" r="2.5"/>
                            <!-- Viewfinder bump -->
                            <path d="M5 4 L5.8 2 h4.4 L11 4"/>
                        </svg>
                        <span class="action-btn-label" id="snapshot-label">Snapshot</span>
                    </button>

                    <!-- Privacy button — visible to all, toggleable by admins only -->
                    <button class="action-btn privacy-btn {{ 'privacy-on' if privacy else '' }}" id="privacy-btn"
                            {{ 'disabled' if not current_user.is_admin else '' }}>
                        {% if privacy %}
                        <!-- Unlocked padlock — privacy is ON, click to resume -->
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="7" width="10" height="7" rx="1.5"/>
                            <path d="M5 7 V4.5 a3 3 0 0 1 6 0"/>
                            <line x1="8" y1="10" x2="8" y2="12"/>
                        </svg>
                        <span class="action-btn-label">Resume</span>
                        {% else %}
                        <!-- Locked padlock — privacy is OFF, click to enable -->
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="7" width="10" height="7" rx="1.5"/>
                            <path d="M5 7 V4.5 a3 3 0 0 1 6 0 V7"/>
                            <line x1="8" y1="10" x2="8" y2="12"/>
                        </svg>
                        <span class="action-btn-label">Privacy</span>
                        {% endif %}
                    </button>
                </div>
            </div>

        </div>

        <!-- Stream settings panel — admin only -->
        {% if current_user.is_admin %}
        <div id="settings-panel">
            <button id="settings-toggle" class="settings-toggle-btn" aria-expanded="false">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="3"/>
                    <path d="M8 1 v2 M8 13 v2 M1 8 h2 M13 8 h2 M2.93 2.93 l1.41 1.41 M11.66 11.66 l1.41 1.41 M13.07 2.93 l-1.41 1.41 M4.34 11.66 l-1.41 1.41"/>
                </svg>
                Stream Settings
                <span class="settings-chevron">&#9660;</span>
            </button>

            <div id="settings-content" class="settings-content" hidden>
                <div class="settings-grid">

                    <div class="settings-field">
                        <label class="settings-label" for="set-resolution">Resolution</label>
                        <select id="set-resolution" class="settings-select">
                            <option value="2560x1440">2560×1440 (4MP)</option>
                            <option value="1920x1080">1920×1080 (1080p)</option>
                            <option value="1280x720">1280×720 (720p)</option>
                            <option value="640x480">640×480 (VGA)</option>
                        </select>
                    </div>

                    <div class="settings-field">
                        <label class="settings-label" for="set-fps">Frame Rate</label>
                        <select id="set-fps" class="settings-select">
                            <option value="5">5 fps</option>
                            <option value="10">10 fps</option>
                            <option value="15">15 fps</option>
                            <option value="20">20 fps</option>
                            <option value="25">25 fps</option>
                            <option value="30">30 fps</option>
                        </select>
                    </div>

                    <div class="settings-field">
                        <label class="settings-label" for="set-bitrate">Bitrate</label>
                        <select id="set-bitrate" class="settings-select">
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="settings-field">
                        <label class="settings-label">Bitrate Mode</label>
                        <div class="settings-radio-group">
                            <label class="settings-radio">
                                <input type="radio" name="bitrate-ctrl" value="VBR"> VBR
                            </label>
                            <label class="settings-radio">
                                <input type="radio" name="bitrate-ctrl" value="CBR"> CBR
                            </label>
                        </div>
                    </div>

                </div>

                <div class="settings-footer">
                    <span id="settings-status" class="settings-status"></span>
                    <button id="settings-save" class="settings-save-btn">Save</button>
                </div>
            </div>
        </div>
        {% endif %}

    </div>

    <script>
        // ── WebRTC stream ─────────────────────────────────────
        (function startStream() {
            const video = document.getElementById('cam-feed');
            if (!video || video.tagName !== 'VIDEO') return; // privacy mode: img element, skip

            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
                bundlePolicy: 'max-bundle',
            });

            // Receive both video and audio tracks from go2rtc
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            pc.ontrack = (ev) => {
                if (ev.streams && ev.streams[0]) {
                    video.srcObject = ev.streams[0];
                }
            };

            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'failed') {
                    console.warn('ICE failed — retrying stream in 3s');
                    setTimeout(startStream, 3000);
                }
            };

            // Create offer, wait for ICE gathering, then POST to Flask proxy
            pc.createOffer()
                .then(offer => pc.setLocalDescription(offer))
                .then(() => new Promise(resolve => {
                    // Wait until ICE gathering is complete so the SDP includes
                    // all host candidates — required for go2rtc HTTP signaling
                    if (pc.iceGatheringState === 'complete') return resolve();
                    pc.onicegatheringstatechange = () => {
                        if (pc.iceGatheringState === 'complete') resolve();
                    };
                    // Safety timeout — proceed with whatever candidates we have
                    setTimeout(resolve, 5000);
                }))
                .then(() => fetch('/stream/webrtc?src=cam', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp,
                }))
                .then(r => {
                    if (!r.ok) throw new Error(`Signaling failed: ${r.status}`);
                    return r.text();
                })
                .then(sdp => pc.setRemoteDescription({ type: 'answer', sdp }))
                .catch(err => {
                    console.error('WebRTC error:', err);
                    // Retry after a short delay — camera may be booting
                    setTimeout(startStream, 5000);
                });
        })();

        // ── Zoom ─────────────────────────────────────────────
        const slider    = document.getElementById('zoom-slider');
        const feed      = document.getElementById('cam-feed');
        const zoomLabel = document.getElementById('zoom-value');

        if (slider && !slider.disabled) {
            slider.addEventListener('input', () => {
                const scale = slider.value / 100;
                feed.style.transform = `scale(${scale})`;
                zoomLabel.textContent = `${scale.toFixed(1)}x`;
            });
        }

        // ── PTZ ──────────────────────────────────────────────
        function startMove(dir) { fetch('/api/move/start/' + dir, { method: 'POST' }).catch(console.error); }
        function stopMove(dir)  { fetch('/api/move/stop/'  + dir, { method: 'POST' }).catch(console.error); }

        document.querySelectorAll('.control-btn[data-dir]:not([disabled])').forEach(btn => {
            const dir = btn.dataset.dir;
            btn.addEventListener('mousedown',  () => startMove(dir));
            btn.addEventListener('mouseup',    () => stopMove(dir));
            btn.addEventListener('mouseleave', () => stopMove(dir));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(dir); }, { passive: false });
            btn.addEventListener('touchend',   (e) => { e.preventDefault(); stopMove(dir);  }, { passive: false });
        });

        // ── Home ─────────────────────────────────────────────
        const homeBtn = document.getElementById('home-btn');
        if (homeBtn && !homeBtn.disabled) {
            homeBtn.addEventListener('click', () => {
                slider.value = 100;
                feed.style.transform = 'scale(1)';
                zoomLabel.textContent = '1.0x';
                fetch('/api/home', { method: 'POST' }).catch(console.error);
            });
        }

        // ── Snapshot ──────────────────────────────────────────
        const snapshotBtn     = document.getElementById('snapshot-btn');
        const snapshotLabel   = document.getElementById('snapshot-label');
        const snapshotPreview = document.getElementById('snapshot-preview');
        const snapshotPreviewImg = document.getElementById('snapshot-preview-img');
        let previewTimeout = null;

        function showSnapshotPreview(url) {
            if (previewTimeout) clearTimeout(previewTimeout);
            snapshotPreviewImg.src = url;
            snapshotPreview.hidden = false;
            previewTimeout = setTimeout(() => {
                snapshotPreview.hidden = true;
                snapshotPreviewImg.src = '';
            }, 3000);
        }

        if (snapshotBtn && !snapshotBtn.disabled) {
            snapshotBtn.addEventListener('click', () => {
                snapshotBtn.disabled      = true;
                snapshotLabel.textContent = 'Capturing…';

                fetch('/api/snapshot', { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 'success') {
                            snapshotLabel.textContent = 'Saved!';
                            showSnapshotPreview(data.url);
                        } else {
                            snapshotLabel.textContent = 'Failed';
                        }
                    })
                    .catch(() => { snapshotLabel.textContent = 'Error'; })
                    .finally(() => {
                        setTimeout(() => {
                            snapshotLabel.textContent = 'Snapshot';
                            snapshotBtn.disabled      = false;
                        }, 2000);
                    });
            });
        }

        // ── Privacy toggle ───────────────────────────────────
        document.getElementById('privacy-btn').addEventListener('click', () => {
            const isOn     = document.body.classList.contains('privacy-active');
            const endpoint = isOn ? '/api/privacy/off' : '/api/privacy/on';
            fetch(endpoint, { method: 'POST' })
                .then(r => r.json())
                .then(() => window.location.reload())
                .catch(err => console.error("Privacy error:", err));
        });

        // ── Stream settings ───────────────────────────────────
        const BITRATE_TABLE = {
            "2560x1440": {
                "5":  [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "10": [1024,1280,1536,1792,2048,4096,6144,8192],
                "15": [1792,2048,4096,6144,8192],
                "20": [4096,6144,8192],
                "25": [4096,6144,8192],
                "30": [4096,6144,8192]
            },
            "1920x1080": {
                "5":  [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "10": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "15": [1024,1280,1536,1792,2048,4096,6144,8192],
                "20": [1280,1536,1792,2048,4096,6144,8192],
                "25": [1536,1792,2048,4096,6144,8192],
                "30": [2048,4096,6144,8192]
            },
            "1280x720": {
                "5":  [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "10": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "15": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "20": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "25": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "30": [768,1024,1280,1536,1792,2048,4096,6144,8192]
            },
            "640x480": {
                "5":  [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "10": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "15": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "20": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "25": [512,768,1024,1280,1536,1792,2048,4096,6144,8192],
                "30": [512,768,1024,1280,1536,1792,2048,4096,6144,8192]
            }
        };

        const resEl     = document.getElementById('set-resolution');
        const fpsEl     = document.getElementById('set-fps');
        const bitrateEl = document.getElementById('set-bitrate');
        const statusEl  = document.getElementById('settings-status');
        let settingsLoaded = false;
        let currentBitrate = null;

        function updateBitrateOptions(preserveValue) {
            const vals = BITRATE_TABLE[resEl.value]?.[fpsEl.value] ?? [512];
            bitrateEl.innerHTML = '';
            vals.forEach(v => {
                const el = document.createElement('option');
                el.value = v;
                el.textContent = `${v} Kbps`;
                bitrateEl.appendChild(el);
            });
            if (preserveValue !== undefined) {
                const closest = vals.reduce((a, b) =>
                    Math.abs(b - preserveValue) < Math.abs(a - preserveValue) ? b : a);
                bitrateEl.value = closest;
            }
        }

        resEl.addEventListener('change', () => updateBitrateOptions());
        fpsEl.addEventListener('change', () => updateBitrateOptions());
        updateBitrateOptions();

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className   = 'settings-status' + (isError ? ' settings-status-error' : ' settings-status-ok');
            if (msg) setTimeout(() => {
                statusEl.textContent = '';
                statusEl.className   = 'settings-status';
            }, 3000);
        }

        function loadSettings() {
            statusEl.textContent = 'Loading…';
            fetch('/api/stream/settings')
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') { setStatus('Failed to load', true); return; }
                    const s = data.settings;
                    resEl.value = s.resolution;
                    fpsEl.value = String(s.fps);
                    document.querySelector(`input[name="bitrate-ctrl"][value="${s.bitrate_ctrl}"]`).checked = true;
                    currentBitrate = s.bitrate;
                    updateBitrateOptions(s.bitrate);
                    statusEl.textContent = '';
                    settingsLoaded = true;
                })
                .catch(() => setStatus('Could not reach camera', true));
        }

        const toggleBtn      = document.getElementById('settings-toggle');
        const settingsContent = document.getElementById('settings-content');
        const chevron        = toggleBtn.querySelector('.settings-chevron');

        toggleBtn.addEventListener('click', () => {
            const isOpen = !settingsContent.hidden;
            settingsContent.hidden = isOpen;
            toggleBtn.setAttribute('aria-expanded', String(!isOpen));
            chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
            if (!isOpen && !settingsLoaded) loadSettings();
        });

        document.getElementById('settings-save').addEventListener('click', () => {
            const resolution  = resEl.value;
            const fps         = parseInt(fpsEl.value);
            const bitrate     = parseInt(bitrateEl.value);
            const bitrateCtrl = document.querySelector('input[name="bitrate-ctrl"]:checked')?.value;
            if (!bitrateCtrl) { setStatus('Select a bitrate mode', true); return; }

            const saveBtn = document.getElementById('settings-save');
            saveBtn.disabled = true;
            setStatus('Saving…');

            fetch('/api/stream/settings', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ resolution, fps, bitrate, bitrate_ctrl: bitrateCtrl })
            })
            .then(r => r.json())
            .then(data => {
                data.status === 'success' ? setStatus('Saved') : setStatus(data.message || 'Save failed', true);
                if (data.status === 'success') currentBitrate = bitrate;
            })
            .catch(() => setStatus('Network error', true))
            .finally(() => { saveBtn.disabled = false; });
        });
    </script>
</body>
</html>
