<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOUDA GAZE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app-container">
        <h1>Gouda Gaze</h1>

        <div id="main-layout">

            <!-- Left: video + zoom -->
            <div id="video-col">
                <div id="video-viewport">
                    <iframe
                        id="cam-feed"
                        src="http://{{ pi_ip }}:1984/webrtc.html?src=cam&mode=webrtc"
                        scrolling="no"
                        allowfullscreen>
                    </iframe>
                </div>

                <div class="zoom-bar">
                    <span class="zoom-label">1x</span>
                    <input
                        type="range"
                        id="zoom-slider"
                        min="100" max="400" step="10" value="100"
                        aria-label="Zoom">
                    <span class="zoom-label" id="zoom-value">1.0x</span>
                </div>
            </div>

            <!-- Right: d-pad with home in center -->
            <div class="control-panel">
                <div class="d-pad-grid">
                    <button class="control-btn" style="grid-area: up"
                        data-dir="up">&#9650;</button>
                    <button class="control-btn" style="grid-area: left"
                        data-dir="left">&#9664;</button>
                    <button class="control-btn home-btn" style="grid-area: center"
                        id="home-btn">&#8962;</button>
                    <button class="control-btn" style="grid-area: right"
                        data-dir="right">&#9654;</button>
                    <button class="control-btn" style="grid-area: down"
                        data-dir="down">&#9660;</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ── Zoom ────────────────────────────────────────────
        const slider    = document.getElementById('zoom-slider');
        const feed      = document.getElementById('cam-feed');
        const zoomLabel = document.getElementById('zoom-value');

        slider.addEventListener('input', () => {
            const scale = slider.value / 100;
            feed.style.transform = `scale(${scale})`;
            zoomLabel.textContent = `${scale.toFixed(1)}x`;
        });

        // ── PTZ continuous movement ─────────────────────────
        function startMove(dir) {
            fetch('/api/move/start/' + dir).catch(err => console.error(err));
        }

        function stopMove(dir) {
            fetch('/api/move/stop/' + dir).catch(err => console.error(err));
        }

        // Attach listeners to all directional buttons
        document.querySelectorAll('.control-btn[data-dir]').forEach(btn => {
            const dir = btn.dataset.dir;

            // Mouse (desktop)
            btn.addEventListener('mousedown',  () => startMove(dir));
            btn.addEventListener('mouseup',    () => stopMove(dir));
            btn.addEventListener('mouseleave', () => stopMove(dir)); // safety stop if cursor drifts off

            // Touch (mobile)
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(dir); }, { passive: false });
            btn.addEventListener('touchend',   (e) => { e.preventDefault(); stopMove(dir); },   { passive: false });
        });

        // ── Home ─────────────────────────────────────────────
        document.getElementById('home-btn').addEventListener('click', () => {
            // Reset digital zoom instantly
            slider.value = 100;
            feed.style.transform = 'scale(1)';
            zoomLabel.textContent = '1.0x';

            fetch('/api/home')
                .then(res => res.json())
                .then(data => console.log("Home:", data))
                .catch(err => console.error("Home error:", err));
        });
    </script>
</body>
</html>
