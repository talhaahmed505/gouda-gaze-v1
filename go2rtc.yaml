api:
  listen: "127.0.0.1:1984"

streams:
  # Amcrest RTSP stream - go2rtc connects directly, no ffmpeg needed on the Pi.
  # Main stream (1080p/4MP): subtype=0
  # Sub stream (lower res, less bandwidth): subtype=1
  cam: rtsp://${CAM_USER}:${CAM_PASS}@${CAM_IP}:554/cam/realmonitor?channel=1&subtype=0